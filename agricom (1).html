function formatDate(s) { if (!s) return "—"; return new Date(s).toLocaleDateString("fr-FR", { day: "2-digit", month: "short", year: "numeric" }); }
function formatTime(s) { if (!s) return ""; return new Date(s).toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" }); }
function getDaysUntil(s) {
  if (!s) return null;
  const d = new Date(s);
  if (isNaN(d.getTime())) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return Math.ceil((d - t) / 86400000);
}
function getLocalTodayString() {
  const d = new Date();
  const offset = d.getTimezoneOffset() * 60000;
  return (new Date(Date.now() - offset)).toISOString().split('T')[0];
}

const callGemini = async (prompt, systemInstruction = "", responseSchema = null) => {
  let customApiKey = "";
  try { customApiKey = localStorage.getItem('tcp_gemini_api_key') || ""; } catch(e) {}
  const apiKey = customApiKey || ""; 
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
  const payload = { contents: [{ parts: [{ text: prompt }] }] };
  if (systemInstruction) payload.systemInstruction = { parts: [{ text: systemInstruction }] };
  if (responseSchema) payload.generationConfig = { responseMimeType: "application/json", responseSchema: responseSchema };
  let delay = 1000; let lastError = null;
  for (let i = 0; i < 5; i++) {
    try {
      const response = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      if (response.ok) { const data = await response.json(); return data.candidates?.[0]?.content?.parts?.[0]?.text || ""; } else { lastError = await response.text(); }
    } catch (e) { lastError = e.message; }
    await new Promise(resolve => setTimeout(resolve, delay)); delay *= 2; 
  }
  console.warn("Passage en mode IA Hors-Ligne/Simulé. Raison :", lastError);
  return simulateOfflineIA(prompt, responseSchema != null);
};

const simulateOfflineIA = (prompt, isJson) => {
  if (isJson) {
     let cat = "autre"; let lower = prompt.toLowerCase();
     if (lower.includes("arros") || lower.includes("eau")) cat = "arrosage";
     else if (lower.includes("recolt")) cat = "recolte";
     else if (lower.includes("labour") || lower.includes("nettoy")) cat = "labour";
     else if (lower.includes("sem") || lower.includes("plant")) cat = "semis";
     else if (lower.includes("trait") || lower.includes("engrais")) cat = "traitement";
     else if (lower.includes("repar") || lower.includes("outil")) cat = "entretien";
     let prio = lower.includes("urgent") ? "haute" : "moyenne";
     return JSON.stringify({ titre: prompt.substring(0, 45) + "...", categorie: cat, statut: "planifie", priorite: prio, description: "Généré via Mode Autonome Local" });
  } else {
     return "🤖 **Assistant Agro-IA (Mode Restreint)**\n\nL'analyse intelligente nécessite une Clé API Gemini configurée dans les paramètres. Vos données sont toutefois sécurisées localement.";
  }
};

function ExcelTable({ columns, rows, onRowsChange, color }) {
  const [deleteId, setDeleteId] = useState(null);
  const [viewMode, setViewMode] = useState(window.innerWidth < 768 ? "cards" : "table");

  useEffect(() => {
    const handleResize = () => {
      if (window.innerWidth < 768 && viewMode === "table") setViewMode("cards");
      else if (window.innerWidth >= 768 && viewMode === "cards") setViewMode("table");
    };
    window.addEventListener("resize", handleResize);
    return () => window.removeEventListener("resize", handleResize);
  }, [viewMode]);

  const addRow = () => {
    const blank = Object.fromEntries(columns.map(c => [c.id, ""]));
    const updated = [...rows, { id: Date.now() + Math.random(), cells: blank }];
    onRowsChange(updated, true);
  };
  
  const updateCell = (rowId, colId, val, isBlur = false) => {
    const updated = rows.map(r => r.id === rowId ? { ...r, cells: { ...r.cells, [colId]: val } } : r);
    onRowsChange(updated, false, colId, val, isBlur);
  };
  
  const confirmDelete = (rowId) => {
    onRowsChange(rows.filter(r => r.id !== rowId), false, "", "", true);
    setDeleteId(null);
  };

  const numCols = columns.filter(c => c.numeric);
  const totals = Object.fromEntries(numCols.map(col => {
    const sum = rows.reduce((s, r) => {
      let val = 0;
      if (col.type === "computed") val = parseFloat(col.compute ? col.compute(r) : 0) || 0;
      else val = parseFloat(r.cells[col.id]) || 0;
      return s + val;
    }, 0);
    return [col.id, sum];
  }));

  const cellStyle = { border:`1px solid ${color}1a`, padding:0, position:"relative" };
  const inputStyle = { width:"100%", border:"none", background:"transparent", padding:"10px 12px", fontSize:"13px", boxSizing:"border-box", outline:"none", transition:"background-color 0.15s" };

  const renderCellInput = (row, col) => {
    const val = row.cells[col.id] || "";
    if (col.type === "etat") {
      const c = ETAT_COLORS[val]; const b = ETAT_BG[val];
      return (
        <select value={val} onChange={e => updateCell(row.id, col.id, e.target.value, true)} style={{ ...inputStyle, color: c || "inherit", fontWeight: val ? 600 : 400, background: b || "transparent" }}>
          <option value="">— Choisir —</option>
          {ETAT_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
        </select>
      );
    }
    if (col.type === "statut_depense") {
      const SC = { Payé:"#1A6B35", Partiel:"#BA7517", "En attente":"#185FA5", Dette:"#A32D2D" };
      const SB = { Payé:"#D4EDDA", Partiel:"#FAEEDA", "En attente":"#E6F1FB", Dette:"#FCEBEB" };
      return (
        <select value={val} onChange={e => updateCell(row.id, col.id, e.target.value, true)} style={{ ...inputStyle, color:SC[val]||"inherit", fontWeight:val?700:400, background:SB[val]||"transparent" }}>
          <option value="">— Statut —</option>
          {["Payé","Partiel","En attente","Dette"].map(o => <option key={o} value={o}>{o}</option>)}
        </select>
      );
    }
    if (col.type === "computed") {
      const computed = col.compute ? col.compute(row) : "";
      const isNeg = typeof computed === "number" && computed < 0;
      return <div style={{ padding:"10px 12px", fontSize:"13px", fontWeight:700, color:isNeg?"#A32D2D":color, textAlign:col.numeric?"right":"left" }}>{typeof computed === "number" ? computed.toLocaleString("fr-FR", {minimumFractionDigits: col.decimals||0, maximumFractionDigits: col.decimals||0}) : computed}</div>;
    }
    if (col.type === "select") return (
      <select value={val} onChange={e => updateCell(row.id, col.id, e.target.value, true)} style={{ ...inputStyle, cursor:"pointer" }}>
        <option value="">— Choisir —</option>
        {col.options.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
    );
    return (
      <input type={col.type==="number"?"number":col.type==="date"?"date":"text"} value={val} onChange={e => updateCell(row.id, col.id, e.target.value, false)} onBlur={e => updateCell(row.id, col.id, e.target.value, true)} style={{ ...inputStyle, textAlign:col.numeric?"right":"left" }} placeholder={col.type==="date"?"jj/mm/aaaa":col.numeric?"0":""}/>
    );
  };

  return (
    <div style={{ borderRadius:18, overflow:"hidden", border:`1px solid ${color}33`, boxShadow:`0 10px 25px -5px ${color}10`, background:"var(--color-background-primary)" }}>
      <div style={{ display:"flex", justifycontent:"space-between", alignItems:"center", padding:"12px 18px", background:color+"06", borderBottom:`1px solid ${color}15`, flexWrap:"wrap", gap:8 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:12, fontWeight:700, color, background:color+"15", padding:"3px 10px", borderRadius:20 }}>{rows.length} ligne(s)</span>
          {viewMode === "table" && <span style={{ fontSize:11.5, color:"var(--color-text-secondary)", fontWeight:500 }}>↔ Glissez pour défiler</span>}
        </div>
        <div style={{ display:"flex", gap:4, background:"var(--color-background-secondary)", padding:2, borderRadius:8 }}>
          <button onClick={() => setViewMode("table")} style={{ display:"flex", alignItems:"center", gap:4, padding:"5px 10px", borderRadius:6, border:"none", cursor:"pointer", fontSize:11.5, fontWeight:600, background:viewMode==="table"?color:"transparent", color:viewMode==="table"?"#fff":"var(--color-text-secondary)" }}><i className="ti ti-table"/> Tableau</button>
          <button onClick={() => setViewMode("cards")} style={{ display:"flex", alignItems:"center", gap:4, padding:"5px 10px", borderRadius:6, border:"none", cursor:"pointer", fontSize:11.5, fontWeight:600, background:viewMode==="cards"?color:"transparent", color:viewMode==="cards"?"#fff":"var(--color-text-secondary)" }}><i className="ti ti-cards"/> Fiches</button>
        </div>
      </div>

      {viewMode === "table" ? (
        <div className="scroll-indicator-container">
          <div style={{ overflowX:"auto" }}>
            <table style={{ borderCollapse:"collapse", width:"100%", fontSize:13 }}>
              <thead>
                <tr>
                  <th style={{ background:color, color:"#fff", padding:"12px 10px", fontSize:12, fontWeight:700, textAlign:"center", width:44, border:`1px solid ${color}33` }}>#</th>
                  {columns.map(col => <th key={col.id} style={{ background:color, color:"#fff", padding:"12px 12px", fontSize:12, fontWeight:700, textAlign:"left", whiteSpace:"nowrap", border:`1px solid ${color}33`, minWidth:col.width||120 }}>{col.label}</th>)}
                  <th style={{ background:color, color:"#fff", width:65, border:`1px solid ${color}33`, textAlign:"center" }}>Action</th>
                </tr>
              </thead>
              <tbody>
                {rows.length === 0 && <tr><td colSpan={columns.length + 2} style={{ textAlign:"center", padding:"4rem", color:"var(--color-text-secondary)", fontSize:14, background:"var(--color-background-primary)" }}><EmptyFolderIllustration color={color} /><br/>Aucune entrée trouvée.</td></tr>}
                {rows.map((row, idx) => {
                  const isCheckingDelete = deleteId === row.id;
                  return (
                    <tr key={row.id} style={{ background:idx%2===0 ? "var(--color-background-primary)" : "var(--color-background-tertiary)", transition:"var(--transition-smooth)" }}>
                      <td style={{ textAlign:"center", color:color, fontSize:11, fontWeight:700, borderRight:`1px solid ${color}12`, padding:"8px 6px", background:color+"04" }}>{idx+1}</td>
                      {columns.map(col => <td key={col.id} style={cellStyle}>{renderCellInput(row, col)}</td>)}
                      <td style={{ textAlign:"center", borderLeft:`1px solid ${color}12`, padding:"4px" }}>
                        {!isCheckingDelete ? (
                          <button onClick={() => setDeleteId(row.id)} title="Supprimer" style={{ background:"none", border:"none", cursor:"pointer", color:"#A32D2D", fontSize:16, padding:"6px 8px", borderRadius:6, margin:"0 auto", opacity: 0.8 }}><i className="ti ti-trash"/></button>
                        ) : (
                          <div style={{ display:"flex", gap:3, justifycontent:"center", alignItems:"center" }}>
                            <button onClick={() => confirmDelete(row.id)} style={{ background:"#A32D2D", border:"none", cursor:"pointer", color:"#fff", fontSize:11, padding:"5px 7px", borderRadius:6, fontWeight:700 }}><i className="ti ti-check"/></button>
                            <button onClick={() => setDeleteId(null)} style={{ background:"var(--color-border-secondary)", border:"none", cursor:"pointer", color:"var(--color-text-primary)", fontSize:11, padding:"5px 7px", borderRadius:6, fontWeight:700 }}><i className="ti ti-arrow-back-up"/></button>
                          </div>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
              {rows.length > 0 && numCols.length > 0 && (
                <tfoot>
                  <tr style={{ background:color+"08" }}>
                    <td style={{ padding:"12px 8px", fontSize:12, fontWeight:800, color:color, borderTop:`2px solid ${color}22`, textAlign:"center" }}>Σ</td>
                    {columns.map(col => {
                      const hasTotal = col.numeric && totals[col.id] !== undefined && col.type !== "computed";
                      return <td key={col.id} style={{ padding:"12px 12px", fontSize:13, fontWeight:800, color:color, borderTop:`2px solid ${color}22`, textAlign:col.numeric?"right":"left" }}>{hasTotal ? (totals[col.id] === 0 ? "—" : totals[col.id].toLocaleString("fr-FR", {minimumFractionDigits: col.decimals||0, maximumFractionDigits: col.decimals||0})) : col.id===columns[0].id?"SOMMES :":""}</td>;
                    })}
                    <td style={{ borderTop:`2px solid ${color}22` }}></td>
                  </tr>
                </tfoot>
              )}
            </table>
          </div>
        </div>
      ) : (
        <div style={{ display:"flex", flexDirection:"column", gap:16, padding:16, background:"var(--color-background-secondary)" }}>
          {rows.length === 0 && <div style={{ textAlign:"center", padding:"4rem", color:"var(--color-text-secondary)", background:"var(--color-background-primary)", borderRadius:16, border:"1px solid var(--color-border-tertiary)" }}><EmptyFolderIllustration color={color} /><br/>Aucune entrée trouvée.</div>}
          {rows.map((row, idx) => {
            const isCheckingDelete = deleteId === row.id;
            return (
              <div key={row.id} style={{ background:"var(--color-background-primary)", border:`1.5px solid ${color}1e`, borderRadius:16, boxShadow:"var(--shadow-sm)", overflow:"hidden" }}>
                <div style={{ background:color+"08", padding:"12px 16px", display:"flex", justifycontent:"space-between", alignItems:"center", borderBottom:`1.5px solid ${color}12` }}>
                  <span style={{ fontWeight:700, fontSize:13, color }}>Fiche #{idx+1}</span>
                  <div>
                    {!isCheckingDelete ? (
                      <button onClick={() => setDeleteId(row.id)} style={{ background:"rgba(163,45,45,0.08)", border:"none", cursor:"pointer", color:"#A32D2D", fontSize:13, padding:"6px 12px", borderRadius:8, display:"flex", alignItems:"center", gap:4, fontWeight:600 }}><i className="ti ti-trash"/> Supprimer</button>
                    ) : (
                      <div style={{ display:"flex", gap:6 }}>
                        <button onClick={() => confirmDelete(row.id)} style={{ background:"#A32D2D", border:"none", color:"#fff", fontSize:11, padding:"5px 10px", borderRadius:6, fontWeight:700, cursor:"pointer" }}>Confirmer</button>
                        <button onClick={() => setDeleteId(null)} style={{ background:"var(--color-border-secondary)", border:"none", color:"var(--color-text-primary)", fontSize:11, padding:"5px 10px", borderRadius:6, fontWeight:700, cursor:"pointer" }}>Annuler</button>
                      </div>
                    )}
                  </div>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))", gap:14, padding:14 }}>
                  {columns.map(col => (
                    <div key={col.id} style={{ display:"flex", flexDirection:"column", gap:5 }}>
                      <span style={{ fontSize:11, fontWeight:700, color:"var(--color-text-secondary)", textTransform:"uppercase", letterSpacing:0.5 }}>{col.label}</span>
                      <div style={{ background:"var(--color-background-tertiary)", borderRadius:10, border:"1px solid var(--color-border-tertiary)", overflow:"hidden" }}>{renderCellInput(row, col)}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}
      <div style={{ padding:"14px 18px", borderTop:`1px solid ${color}15`, background:color+"03", display:"flex", alignItems:"center", justifycontent:"space-between", flexWrap:"wrap", gap:10 }}>
        <button onClick={addRow} style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 20px", borderRadius:10, border:`2px dashed ${color}aa`, background:"var(--color-background-primary)", color:color, cursor:"pointer", fontSize:13.5, fontWeight:600 }}><i className="ti ti-plus"/> Ajouter une ligne de saisie</button>
        <span style={{ fontSize:12, color:"var(--color-text-secondary)", fontWeight:600 }}>{rows.length} lignes enregistrées</span>
      </div>
    </div>
  );
}

function CustomChart({ type, data, options, height = 250 }) {
  const canvasRef = useRef(null);
  const chartInstance = useRef(null);

  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartInstance.current) {
      chartInstance.current.destroy();
    }
    
    if (window.Chart) {
      chartInstance.current = new window.Chart(canvasRef.current, {
        type,
        data,
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom', labels: { font: { family: 'system-ui', size: 11 } } }
          },
          ...options
        }
      });
    }

    return () => {
      if (chartInstance.current) chartInstance.current.destroy();
    };
  }, [type, data, options]);

  return <div style={{ height, width: '100%', position: 'relative' }}><canvas ref={canvasRef}></canvas></div>;
}

// ----------------------------------------------------------------------
// ONGLET : ANALYSES & STATISTIQUES
// ----------------------------------------------------------------------
function AnalysesTab({ tasks, expenses, ouvriers, transformations, materiel, stocks }) {
  const [timeframe, setTimeframe] = useState('semaine');

  const getBuckets = (tf) => {
    const buckets = []; const labels = []; const now = new Date();
    if (tf === 'semaine') {
      for(let i=6; i>=0; i--) {
        const d = new Date(); d.setDate(now.getDate() - i);
        d.setHours(0,0,0,0); const end = new Date(d); end.setHours(23,59,59,999);
        labels.push(d.toLocaleDateString('fr-FR', {weekday:'short'})); buckets.push({ start: d, end });
      }
    } else if (tf === 'mois') {
      for(let i=3; i>=0; i--) {
        const end = new Date(); end.setDate(now.getDate() - (i*7)); end.setHours(23,59,59,999);
        const start = new Date(end); start.setDate(end.getDate() - 6); start.setHours(0,0,0,0);
        labels.push(`Sem. ${4-i}`); buckets.push({ start, end });
      }
    }
    return { labels, buckets };
  };

  const { labels, buckets } = useMemo(() => getBuckets(timeframe), [timeframe]);
  const inBucket = (dateStr, b) => { if (!dateStr) return false; const d = new Date(dateStr); return d >= b.start && d <= b.end; };

  const expensesData = useMemo(() => buckets.map(b => expenses.filter(e => inBucket(e.cells.date, b)).reduce((sum, e) => sum + (parseFloat(e.cells.montant_du) || 0), 0)), [buckets, expenses]);
  const tasksDoneData = useMemo(() => buckets.map(b => tasks.filter(t => t.statut === "termine" && inBucket(t.dateFin || t.createdAt, b)).length), [buckets, tasks]);
  const tasksPlanData = useMemo(() => buckets.map(b => tasks.filter(t => t.statut !== "termine" && inBucket(t.dateDebut || t.createdAt, b)).length), [buckets, tasks]);

  return (
    <div style={{ animation: "fadeIn 0.3s" }}>
      <div style={{ display:"flex", gap:10, marginBottom:"1.5rem", background:"var(--color-background-primary)", padding:8, borderRadius:12, border:"1px solid var(--color-border-tertiary)", width:"fit-content", boxShadow:"var(--shadow-sm)" }}>
        {[ { id: 'semaine', label: '7 Derniers Jours' }, { id: 'mois', label: '4 Dernières Semaines' } ].map(tf => (
          <button key={tf.id} onClick={() => setTimeframe(tf.id)} style={{ padding:"8px 16px", borderRadius:8, border:"none", cursor:"pointer", fontWeight:600, fontSize:13, background: timeframe === tf.id ? "var(--color-brand-primary)" : "transparent", color: timeframe === tf.id ? "#fff" : "var(--color-text-secondary)", transition:"all 0.2s" }}>
            {tf.label}
          </button>
        ))}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(400px, 1fr))", gap:20, marginBottom:"2rem" }}>
        <div style={{ background:"var(--color-background-primary)", padding:20, borderRadius:16, border:"1px solid var(--color-border-tertiary)", boxShadow:"var(--shadow-sm)" }}>
          <h3 style={{ margin:"0 0 16px 0", fontSize:14.5, color:"var(--color-brand-primary)", display:"flex", alignItems:"center", gap:8 }}><i className="ti ti-chart-line"/> Évolution des Dépenses (FCFA)</h3>
          <CustomChart type="line" data={{ labels, datasets: [{ label: "Dépenses engagées", data: expensesData, borderColor: "var(--color-brand-primary)", backgroundColor: "rgba(0, 33, 10, 0.1)", fill: true, tension: 0.3 }] }}/>
        </div>
        <div style={{ background:"var(--color-background-primary)", padding:20, borderRadius:16, border:"1px solid var(--color-border-tertiary)", boxShadow:"var(--shadow-sm)" }}>
          <h3 style={{ margin:"0 0 16px 0", fontSize:14.5, color:"var(--color-brand-primary)", display:"flex", alignItems:"center", gap:8 }}><i className="ti ti-chart-bar"/> Progression des Travaux</h3>
          <CustomChart type="bar" data={{ labels, datasets: [ { label: "Travaux Terminés", data: tasksDoneData, backgroundColor: "#3B6D11", borderRadius: 4 }, { label: "Planifiés / En cours", data: tasksPlanData, backgroundColor: "var(--color-brand-primary)", borderRadius: 4 } ] }} options={{ scales: { x: { stacked: true }, y: { stacked: true } } }}/>
        </div>
      </div>
    </div>
  );
}

function PlantationTab({ addToast, dbUser, admins, availableCultures, allPlantationData, onPlantationRowsChange, loadCulturesAndData }) {
  const [activePlant, setActivePlant] = useState("");
  const [showConfigPanel, setShowConfigPanel] = useState(false);
  const [cultureToDelete, setCultureToDelete] = useState(null);
  const [newCulture, setNewCulture] = useState({ id: "", label: "", emoji: "🌱", color: "#1D9E75", selectedCols: ["parcelle", "superficie", "nb_plants", "etat", "observations"] });

  useEffect(() => { if (availableCultures && Object.keys(availableCultures).length > 0) { const keys = Object.keys(availableCultures); if (!activePlant || !keys.includes(activePlant)) setActivePlant(keys[0]); } }, [availableCultures, activePlant]);

  const handleCreateCulture = async () => {
    if (!newCulture.label.trim()) return addToast("Nom requis", "Saisissez un nom.", "error");
    const key = newCulture.label.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "_");
    if (availableCultures[key]) return addToast("Erreur doublon", "Culture existante.", "error");
    const columns = BIEN_COLONNES_DISPONIBLES.filter(col => newCulture.selectedCols.includes(col.id));
    const configData = { label: newCulture.label, emoji: newCulture.emoji, color: newCulture.color, isDefault: false, columns };
    const updatedConfigs = { ...availableCultures, [key]: configData };
    const customOnly = {}; Object.entries(updatedConfigs).forEach(([k, v]) => { if (!v.isDefault) customOnly[k] = v; });
    await storage.set("custom_plantation_configs", JSON.stringify(customOnly));
    await storage.set(`plantation_${key}`, JSON.stringify([]));
    await loadCulturesAndData(); window.dispatchEvent(new Event("culturesUpdated"));
    setActivePlant(key); setShowConfigPanel(false); addToast("Succès", `Culture ${configData.label} créée !`, "success");
  };

  const confirmDeleteCulture = async () => {
    if (!cultureToDelete) return;
    const key = cultureToDelete; const updatedConfigs = { ...availableCultures }; delete updatedConfigs[key];
    const customOnly = {}; Object.entries(updatedConfigs).forEach(([k, v]) => { if (!v.isDefault) customOnly[k] = v; });
    await storage.set("custom_plantation_configs", JSON.stringify(customOnly));
    await storage.delete(`plantation_${key}`);
    await loadCulturesAndData(); window.dispatchEvent(new Event("culturesUpdated"));
    setActivePlant(Object.keys(updatedConfigs)[0] || "");
    setCultureToDelete(null); addToast("Supprimé", "Culture retirée.", "error");
  };

  const config = availableCultures[activePlant] || { label: "", color: "var(--color-brand-primary)", emoji: "🌴", columns: [] };
  const rows = allPlantationData[activePlant] || [];
  const totalStats = Object.entries(availableCultures).map(([key, cfg]) => {
    const r = allPlantationData[key] || [];
    const numCol = cfg.columns.find(c => c.id === "nb_plants" || c.id === "nb_arbres" || c.id === "nb_pieds");
    const total = numCol ? r.reduce((s, row) => s + (parseFloat(row.cells[numCol.id]) || 0), 0) : 0;
    return { key, cfg, count: r.length, total };
  });

  return (
    <div style={{ animation: "fadeIn 0.3s" }}>
      <ConfirmModal show={!!cultureToDelete} title="Supprimer la culture" message="Confirmer la suppression ?" onConfirm={confirmDeleteCulture} onCancel={() => setCultureToDelete(null)} />
      <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 12 }}>
        <button onClick={() => setShowConfigPanel(!showConfigPanel)} style={{ display:"flex", alignItems:"center", gap:6, padding:"8px 14px", borderRadius:10, border:"none", background:"var(--color-brand-primary)", color:"#fff", cursor:"pointer", fontSize:12.5, fontWeight:600 }}><i className="ti ti-settings"/> Gérer les cultures</button>
      </div>

      {showConfigPanel && (
        <div style={{ background: "var(--color-background-primary)", borderRadius: 18, border: "1.5px solid var(--color-border-secondary)", padding: 20, marginBottom: 20 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}><h3 style={{ margin: 0, fontSize: 14.5, fontWeight: 700, color: "var(--color-brand-primary)" }}>Ajouter une culture</h3><button onClick={() => setShowConfigPanel(false)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18 }}>×</button></div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap:14, marginBottom: 16 }}>
            <div><label style={{ fontSize:11.5, fontWeight:700, display:"block", marginBottom:6 }}>Nom *</label><input value={newCulture.label} onChange={e => setNewCulture({...newCulture, label: e.target.value})} style={{width: "100%"}}/></div>
            <div><label style={{ fontSize:11.5, fontWeight:700, display:"block", marginBottom:6 }}>Émoji</label><select value={newCulture.emoji} onChange={e => setNewCulture({...newCulture, emoji: e.target.value})} style={{width: "100%"}}>{["🌱","🌾","🥑","☕","🍌","🍍","🍅","🌽","🥔","🥦"].map(em => <option key={em} value={em}>{em}</option>)}</select></div>
            <div><label style={{ fontSize:11.5, fontWeight:700, display:"block", marginBottom:6 }}>Couleur</label><select value={newCulture.color} onChange={e => setNewCulture({...newCulture, color: e.target.value})} style={{width: "100%"}}>{["#00210A","#2C3E8C","#5A2F0A","#C45C00","#8A7A00","#6B1A3A","#BA7517","#534AB7"].map(c => <option key={c} value={c} style={{ background:c, color:"#fff" }}>{c}</option>)}</select></div>
          </div>
          <button onClick={handleCreateCulture} style={{ padding: "12px 18px", border: "none", background: "var(--color-brand-primary)", color: "#fff", borderRadius: 10, fontWeight: 700, width: "100%", cursor: "pointer" }}>Valider et initialiser</button>
        </div>
      )}

      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))", gap:12, marginBottom:"1.5rem" }}>
        {totalStats.map(({ key, cfg, count, total }) => (
          <div key={key} onClick={() => setActivePlant(key)} style={{ background:activePlant===key ? `linear-gradient(135deg, ${cfg.color}, #00210A)` : "var(--color-background-primary)", borderRadius:16, padding:"14px 16px", cursor:"pointer", border:`1.5px solid ${activePlant===key ? "var(--color-brand-accent)" : "var(--color-border-tertiary)"}`, transition:"0.2s" }}>
            <div style={{ fontSize:22, marginBottom:4, display: "flex", justifycontent: "space-between", alignItems: "center" }}>
              <span>{cfg.emoji}</span>
              {!cfg.isDefault && <button onClick={(e) => { e.stopPropagation(); setCultureToDelete(key); }} style={{ background:"none", border:"none", color: activePlant===key ? "#fff" : "#A32D2D", cursor:"pointer", padding:2 }}><i className="ti ti-trash"/></button>}
            </div>
            <div style={{ fontSize:12, fontWeight:700, color:activePlant===key?"#fff":cfg.color, marginBottom:4 }}>{cfg.label}</div>
            <div style={{ fontSize:22, fontWeight:800, color:activePlant===key?"#fff":cfg.color }}>{count}</div>
          </div>
        ))}
      </div>

      <div style={{ display:"flex", alignItems:"center", justifycontent:"space-between", marginBottom:"1rem", flexWrap:"wrap", gap:10 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:26 }}>{config.emoji}</span>
          <div><h2 style={{ margin:0, fontSize:16, fontWeight:700, color:config.color }}>Suivi {config.label}</h2><div style={{ fontSize:12, color:"var(--color-text-secondary)" }}>{rows.length} enregistrements</div></div>
        </div>
      </div>
      <ExcelTable columns={config.columns} rows={rows} onRowsChange={(r, isA, c, v, b) => onPlantationRowsChange(activePlant, r, isA, c, v, b)} color={config.color}/>
    </div>
  );
}

  // Champs pour l'assistant de saisie intelligent
  const [aiPromptInput, setAiPromptInput] = useState("");
  const [aiParsing, setAiParsing] = useState(false);
  
  const [dbUser, setDbUser] = useState(null);
  const [admins, setAdmins] = useState([]);
  const [showSettings, setShowSettings] = useState(false);
  const [showGlobalReport, setShowGlobalReport] = useState(false);
  
  // Logistics Operational States

  const [stocksData, setStocksData] = useState([]);

  const loadCulturesAndData = useCallback(async () => {
    const r = await storage.get("custom_plantation_configs");
    let storedConfigs = {}; if (r?.value) storedConfigs = JSON.parse(r.value);
    const mergedCultures = { ...DEFAULT_PLANTATION_CONFIGS, ...storedConfigs };
    setAvailableCultures(mergedCultures);
    const localData = {};
    for (const key of Object.keys(mergedCultures)) { const dataRes = await storage.get(`plantation_${key}`); localData[key] = dataRes?.value ? JSON.parse(dataRes.value) : []; }

                <div style={{ background:"#EEF1FB", borderRadius:16, padding:"16px", border:"1px solid #2C3E8C1e" }}>
                  <div style={{ fontSize:11, color:"#2C3E8C", marginBottom:6, fontWeight:700, textTransform:"uppercase" }}>Trésorerie Exploitation</div>
                  <div style={{ fontSize:24, fontWeight:800, color: (rawExpenses.reduce((s, r) => s + (parseFloat(r.cells.montant_du) || 0), 0) - rawExpenses.reduce((s, r) => s + (parseFloat(r.cells.montant_paye) || 0), 0)) > 0 ? "#A32D2D" : "#1A6B35" }}>{(rawExpenses.reduce((s, r) => s + (parseFloat(r.cells.montant_du) || 0), 0) - rawExpenses.reduce((s, r) => s + (parseFloat(r.cells.montant_paye) || 0), 0)).toLocaleString("fr-FR")} <span style={{ fontSize:13, fontWeight:500 }}>FCFA dûs</span></div>
                </div>
              </div>

              <h2 style={{ fontSize:15, fontWeight:700, margin:"1.5rem 0 12px", color:"var(--color-text-primary)" }}>Indicateurs Opérationnels</h2>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))", gap:14, marginBottom:"1.5rem" }}>
                <div onClick={() => setActiveTab("ouvriers")} style={{ background:"var(--color-background-primary)", borderRadius:14, padding:"16px", border:"1px solid var(--color-border-tertiary)", display:"flex", alignItems:"center", gap:14, boxShadow:"var(--shadow-sm)", cursor:"pointer" }}>
                  <div style={{ width:42, height:42, borderRadius:12, background:"#0284C715", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}><i className="ti ti-users" style={{ color:"#0284C7", fontSize:22 }}/></div>
                  <div><div style={{ fontSize:11.5, color:"var(--color-text-secondary)", fontWeight:600, textTransform:"uppercase" }}>Ouvriers Présents</div><div style={{ fontSize:20, fontWeight:800, color:"#0284C7" }}>{ouvriersPresentsAujourdhui} <span style={{fontSize:12, fontWeight:500, color:"var(--color-text-secondary)"}}>/ {ouvriersData.length}</span></div></div>
                </div>
                <div onClick={() => setActiveTab("materiel")} style={{ background:"var(--color-background-primary)", borderRadius:14, padding:"16px", border:"1px solid var(--color-border-tertiary)", display:"flex", alignItems:"center", gap:14, boxShadow:"var(--shadow-sm)", cursor:"pointer" }}>
                  <div style={{ width:42, height:42, borderRadius:12, background:"#D9770615", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}><i className="ti ti-tractor" style={{ color:"#D97706", fontSize:22 }}/></div>
                  <div><div style={{ fontSize:11.5, color:"var(--color-text-secondary)", fontWeight:600, textTransform:"uppercase" }}>Équipements en Panne</div><div style={{ fontSize:20, fontWeight:800, color: enPanneMateriel > 0 ? "#EF4444" : "#D97706" }}>{enPanneMateriel}</div></div>
                </div>
                <div onClick={() => setActiveTab("transformation")} style={{ background:"var(--color-background-primary)", borderRadius:14, padding:"16px", border:"1px solid var(--color-border-tertiary)", display:"flex", alignItems:"center", gap:14, boxShadow:"var(--shadow-sm)", cursor:"pointer" }}>
                  <div style={{ width:42, height:42, borderRadius:12, background:"#7C3AED15", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}><i className="ti ti-flask" style={{ color:"#7C3AED", fontSize:22 }}/></div>
                  <div><div style={{ fontSize:11.5, color:"var(--color-text-secondary)", fontWeight:600, textTransform:"uppercase" }}>Transformations</div><div style={{ fontSize:20, fontWeight:800, color:"#7C3AED" }}>{transformationData.length}</div></div>
                </div>
                <div onClick={() => setActiveTab("stocks")} style={{ background:"var(--color-background-primary)", borderRadius:14, padding:"16px", border:"1px solid var(--color-border-tertiary)", display:"flex", alignItems:"center", gap:14, boxShadow:"var(--shadow-sm)", cursor:"pointer" }}>
                  <div style={{ width:42, height:42, borderRadius:12, background:"#05966915", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}><i className="ti ti-packages" style={{ color:"#059669", fontSize:22 }}/></div>
                  <div><div style={{ fontSize:11.5, color:"var(--color-text-secondary)", fontWeight:600, textTransform:"uppercase" }}>Alertes de Stocks</div><div style={{ fontSize:20, fontWeight:800, color: alerteStocks.length > 0 ? "#EF4444" : "#059669" }}>{alerteStocks.length}</div></div>
                </div>
              </div>

              <h2 style={{ fontSize:15, fontWeight:700, margin:"1.5rem 0 12px", color:"var(--color-text-primary)" }}>Logistique & Traçabilité Récente</h2>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(280px, 1fr))", gap:16, marginBottom:"2rem" }}>
                <div style={{ background:"var(--color-background-primary)", borderRadius:16, padding:18, border:"1px solid var(--color-border-tertiary)" }}>
                  <h3 style={{ margin:"0 0 12px", fontSize:13.5, fontWeight:700, color:"#059669", display:"flex", alignItems:"center", gap:6 }}><i className="ti ti-packages"/> Ruptures Stocks</h3>
                  <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                    {alerteStocks.slice(0,3).map((item, idx) => (
                      <div key={idx} style={{ background:"var(--color-background-tertiary)", borderRadius:10, padding:"8px 12px", border:"1px solid var(--color-border-tertiary)", display:"flex", justifycontent:"space-between", alignItems:"center" }}>
                        <div><div style={{ fontWeight:700, fontSize:13 }}>{item.cells.nom}</div><div style={{ fontSize:11, color:"var(--color-text-secondary)" }}>Seuil: {item.cells.seuil}</div></div>
                        <div style={{ fontSize:13, fontWeight:800, color:"#A32D2D" }}>{item.cells.qte} {item.cells.unite}</div>
                      </div>
                    ))}
                    {alerteStocks.length === 0 && <div style={{ textAlign:"center", padding:"1rem", color:"var(--color-text-secondary)", fontSize:12 }}>Aucune alerte.</div>}
                  </div>
                </div>

                <div style={{ background:"var(--color-background-primary)", borderRadius:16, padding:18, border:"1px solid var(--color-border-tertiary)" }}>
                  <h3 style={{ margin:"0 0 12px", fontSize:13.5, fontWeight:700, color:"#0284C7", display:"flex", alignItems:"center", gap:6 }}><i className="ti ti-users"/> Pointages Récents</h3>
                  <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                    {[...ouvriersData].reverse().slice(0,3).map((item, idx) => (
                      <div key={idx} style={{ background:"var(--color-background-tertiary)", borderRadius:10, padding:"8px 12px", border:"1px solid var(--color-border-tertiary)", display:"flex", justifycontent:"space-between", alignItems:"center" }}>
                        <div><div style={{ fontWeight:700, fontSize:13 }}>{item.cells.nom}</div><div style={{ fontSize:11, color:"var(--color-text-secondary)" }}>{formatDate(item.cells.date)}</div></div>
                        <span style={{ fontSize:11, padding:"3px 8px", borderRadius:12, fontWeight:700, background: item.cells.statut === "Présent" ? "#EAF3DE" : "#FCEBEB", color: item.cells.statut === "Présent" ? "#3B6D11" : "#A32D2D" }}>{item.cells.statut}</span>
                      </div>
                    ))}
                    {ouvriersData.length === 0 && <div style={{ textAlign:"center", padding:"1rem", color:"var(--color-text-secondary)", fontSize:12 }}>Aucun pointage.</div>}
                  </div>
                </div>
              </div>
            </div>
          )}

          {activeTab==="taches" && (
            <div>
              <div style={{ background:"linear-gradient(135deg, rgba(168, 255, 0, 0.1), rgba(0, 33, 10, 0.05))", border:"1px solid var(--color-brand-accent)", borderRadius:18, padding:18, marginBottom:16 }}>
                <h3 style={{ margin:"0 0 10px 0", fontSize:13.5, fontWeight:700, color:"var(--color-brand-primary)", display:"flex", alignItems:"center", gap:8 }}>
                  <i className="ti ti-wand" /> Assistant de Saisie Intelligent ✨
                </h3>
                <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                  <input value={aiPromptInput} onChange={e=>setAiPromptInput(e.target.value)} placeholder="Ex: Koffi doit récolter la parcelle C cacao le 5 juin..." style={{ flex:1, minWidth:260, background:"#fff" }} onKeyDown={e => e.key === "Enter" && handleAIGenerateTask()}/>
                  <button onClick={handleAIGenerateTask} disabled={aiParsing} style={{ background:"var(--color-brand-primary)", color:"#fff", border:"none", padding:"10px 20px", borderRadius:10, fontWeight:700, cursor: "pointer" }}>Générer avec l'IA</button>
                </div>
              </div>

              {showForm && (
                <div style={{ background:"var(--color-background-primary)", border:"1px solid var(--color-border-secondary)", borderRadius:18, padding:"1.5rem", marginBottom:"1.5rem" }}>
                  <h2 style={{ margin:"0 0 1.25rem", fontSize:16, fontWeight:700, color:"var(--color-brand-primary)" }}>{editingTask?"Modifier l'activité":"Créer un nouveau travail"}</h2>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))", gap:16 }}>
                    <div style={{ gridColumn:"1/-1" }}><label style={{ fontSize:12, fontWeight:700, display:"block", marginBottom:5 }}>Titre de l'activité *</label><input value={form.titre} onChange={e=>setForm(f=>({...f,titre:e.target.value}))}/></div>
                    {[["categorie","Catégorie",CATEGORIES.map(c=>({id:c.id,label:c.label}))],["statut","Statut",STATUTS.map(s=>({id:s.id,label:s.label}))],["priorite","Priorité",PRIORITIES.map(p=>({id:p.id,label:p.label}))]].map(([field,label,opts])=>(
                      <div key={field}><label style={{ fontSize:12, fontWeight:700, display:"block", marginBottom:5 }}>{label}</label><select value={form[field]} onChange={e=>setForm(f=>({...f,[field]:e.target.value}))}>{opts.map(o=><option key={o.id} value={o.id}>{o.label}</option>)}</select></div>
                    ))}
                    <div style={{ gridColumn:"1/-1" }}><label style={{ fontSize:12, fontWeight:700, display:"block", marginBottom:5 }}>Notes</label><textarea value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} rows={3}/></div>
                  </div>
                  <div style={{ display:"flex", gap:10, marginTop:"1.5rem", justifycontent:"flex-end" }}>
                    <button onClick={()=>{ setShowForm(false); setEditingTask(null); }} style={{ padding:"10px 22px", borderRadius:10, border:"1px solid var(--color-border-secondary)", background:"transparent", cursor:"pointer" }}>Annuler</button>
                    <button onClick={handleSubmit} style={{ padding:"10px 24px", borderRadius:10, border:"none", background:"var(--color-brand-primary)", color:"#fff", cursor:"pointer", fontWeight:700 }}>Valider</button>
                  </div>
                </div>
              )}
              {tasks.map(task=>{ const cat=CATEGORIES.find(c=>c.id===task.categorie); const stat=STATUTS.find(s=>s.id===task.statut); return (
                <div key={task.id} style={{ border:"1px solid var(--color-border-tertiary)", borderRadius:16, padding:"14px 16px", marginBottom:10, background:"var(--color-background-primary)", boxShadow:"var(--shadow-sm)" , display:"flex", alignItems:"center", gap:14 }}>
                  <div style={{ width:44, height:44, borderRadius:12, background:cat?.color+"15", display:"flex", alignItems:"center", justifycontent:"center", flexShrink:0 }}><i className={`ti ${cat?.icon}`} style={{ color:cat?.color, fontSize:24 }}/></div>
                  <div style={{ flex:1, minWidth:0 }}><div style={{ fontWeight:700, fontSize:15 }}>{task.titre}</div><div style={{ fontSize:12, color:"var(--color-text-secondary)" }}>{task.description}</div></div>
                  <span style={{ fontSize:11, padding:"4px 10px", borderRadius:20, background:stat?.bg, color:stat?.color, fontWeight:700 }}>{stat?.label}</span>
                </div>
              ); })}
            </div>
          )}

          {activeTab==="rappels" && (
            <div>
              <h2 style={{ fontSize:15, fontWeight:700, color:"var(--color-text-primary)" }}>Alertes d'échéances urgentes</h2>
              {tasks.filter(t => { const d = getDaysUntil(t.dateFin); return d !== null && d <= 7 && t.statut !== "termine"; }).map(task => { const d=getDaysUntil(task.dateFin); return (
                <div key={task.id} style={{ display:"flex", alignItems:"center", gap:14, padding:"14px 18px", borderRadius:16, border:"1px solid #BA751744", background:"#FAEEDA", marginBottom:10 }}><div style={{ fontWeight:700, color:"#BA7517" }}>{task.titre} - J-{d}</div></div>
              )})}
            </div>
          )}

          {activeTab==="conseils_ia" && <AgroIATab tasks={tasks} expenses={rawExpenses} ouvriers={ouvriersData} transformations={transformationData} materiel={materielData} stocks={stocksData} archives={archivesData} availableCultures={availableCultures} addToast={addToast} />}
          {activeTab==="plantation" && <PlantationTab addToast={addToast} dbUser={dbUser} admins={admins} availableCultures={availableCultures} allPlantationData={allPlantationData} onPlantationRowsChange={handlePlantationRowsChange} loadCulturesAndData={loadCulturesAndData} />}
          {activeTab==="depenses" && <DepensesTab addToast={addToast} tasks={tasks} dbUser={dbUser} expenses={rawExpenses} onExpensesChange={handleExpensesChange} admins={admins} setAdmins={setAdmins}/>}
          {activeTab==="materiel" && <MaterielTab materiel={materielData} onMaterielChange={(r,a,c,v,b) => handleGenericDataChange("materiel_equipements", setMaterielData, r, a, c, v, b)} />}
          {activeTab==="ouvriers" && <OuvriersTab ouvriers={ouvriersData} onOuvriersChange={(r,a,c,v,b) => handleGenericDataChange("presence_ouvriers", setOuvriersData, r, a, c, v, b)} />}
          {activeTab==="transformation" && <TransformationTab availableCultures={availableCultures} transformation={transformationData} onTransformationChange={(r,a,c,v,b) => handleGenericDataChange("transformation_cultures", setTransformationData, r, a, c, v, b)} />}
          {activeTab==="stocks" && <StocksTab stocks={stocksData} onStocksChange={(r,a,c,v,b) => handleGenericDataChange("gestion_stocks", setStocksData, r, a, c, v, b)} />}
          {activeTab==="archive" && <ArchivesTab archives={archivesData} onArchivesChange={handleArchivesChange} addToast={addToast} />}
        </div>
      </main>
    </div>
  );
}

// ----------------------------------------------------------------------
// AUTHENTICATION SCREEN WITH PERSISTENT USER DB
// ----------------------------------------------------------------------
function AuthScreen({ onLogin }) {
  const [isLogin, setIsLogin] = useState(true); const [email, setEmail] = useState(''); const [password, setPassword] = useState(''); const [name, setName] = useState(''); const [errorMsg, setErrorMsg] = useState(''); const [successMsg, setSuccessMsg] = useState('');

  const getUsersFromStore = () => { try { const u = localStorage.getItem('tcp_registered_users'); if (u) return JSON.parse(u); const defaultUsers = [{ email: 'chef@champetres.pro', password: 'chef', name: "Chef d'exploitation" }]; localStorage.setItem('tcp_registered_users', JSON.stringify(defaultUsers)); return defaultUsers; } catch(e) { return []; } };

  const handleAuthSubmit = (e) => {
    e.preventDefault(); setErrorMsg(''); setSuccessMsg('');
    if (!email || !password || (!isLogin && !name)) { setErrorMsg('Veuillez remplir correctement tous les champs requis.'); return; }
    const registeredUsers = getUsersFromStore();
    if (isLogin) {
      const matchedUser = registeredUsers.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === password);
      if (matchedUser) onLogin({ email: matchedUser.email, name: matchedUser.name }); else setErrorMsg('Adresse email ou mot de passe incorrect.');
    } else {
      if (registeredUsers.some(u => u.email.toLowerCase() === email.toLowerCase())) { setErrorMsg('Cet email est déjà lié à un compte existant.'); return; }
      const newUser = { email: email.toLowerCase(), password, name }; const updatedUsers = [...registeredUsers, newUser];
      try { localStorage.setItem('tcp_registered_users', JSON.stringify(updatedUsers)); setSuccessMsg('Compte créé avec succès ! Connectez-vous maintenant.'); setIsLogin(true); setPassword(''); } catch(err) { setErrorMsg("Impossible d'enregistrer le compte."); }
    }
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--color-brand-primary)', padding: '20px' }}>
      <div style={{ background: 'var(--color-background-primary)', padding: '40px', borderRadius: '20px', boxShadow: '0 10px 25px rgba(0,0,0,0.15)', width: '100%', maxWidth: '420px', animation: 'fadeIn 0.5s ease-out' }}>
        <div style={{ textAlign: 'center', marginBottom: '24px' }}>
          <div style={{ background: 'var(--color-brand-primary)', width: '64px', height: '64px', borderRadius: '16px', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px', color: 'var(--color-brand-accent)', fontSize: '32px', border:'1px solid var(--color-brand-accent)' }}><i className="ti ti-plant-2"></i></div>
          <h2 style={{ margin: 0, color: 'var(--color-text-primary)', fontSize: '24px', fontWeight: 700 }}>Agricom</h2>
          <p style={{ margin: '8px 0 0 0', color: 'var(--color-text-secondary)', fontSize: '14.5px' }}>{isLogin ? 'Connectez-vous à votre espace' : 'Créez votre compte'}</p>
        </div>
        {errorMsg && <div style={{ background: '#FCEBEB', border: '1px solid #E24B4A', color: '#A32D2D', borderRadius: '10px', padding: '12px 14px', fontSize: '13px', marginBottom: '18px', fontWeight: 600 }}>{errorMsg}</div>}
        {successMsg && <div style={{ background: '#EAF3DE', border: '1px solid #639922', color: '#3B6D11', borderRadius: '10px', padding: '12px 14px', fontSize: '13px', marginBottom: '18px', fontWeight: 600 }}>{successMsg}</div>}
        <form onSubmit={handleAuthSubmit} style={{ display: 'flex', flexDirection: 'column', gap: '18px' }}>
          {!isLogin && <div><label style={{ display: 'block', fontSize: '13px', fontWeight: 600, marginBottom: '8px' }}>Nom complet</label><input type="text" required value={name} onChange={e => setName(e.target.value)} style={{ width: '100%' }} placeholder="Ex: Jean Dupont"/></div>}
          <div><label style={{ display: 'block', fontSize: '13px', fontWeight: 600, marginBottom: '8px' }}>Adresse Email</label><input type="email" required value={email} onChange={e => setEmail(e.target.value)} style={{ width: '100%' }} placeholder="agriculteur@domaine.com"/></div>
          <div><label style={{ display: 'block', fontSize: '13px', fontWeight: 600, marginBottom: '8px' }}>Mot de passe</label><input type="password" required value={password} onChange={e => setPassword(e.target.value)} style={{ width: '100%' }} placeholder="••••••••"/></div>
          <button type="submit" style={{ marginTop: '12px', background: 'var(--color-brand-primary)', color: 'var(--color-brand-accent)', border: '1px solid var(--color-brand-accent)', padding: '14px', borderRadius: '10px', fontSize: '15px', fontWeight: 700, cursor: 'pointer' }}>{isLogin ? 'Accéder au tableau de bord' : "Créer mon compte"}</button>
        </form>
        <div style={{ marginTop: '20px', background: 'var(--color-background-secondary)', padding: '12px', borderRadius: '10px', border: '1px dashed var(--color-border-secondary)' }}>
          <div style={{ fontSize: '11px', color: 'var(--color-text-secondary)', fontWeight: '700', textTransform: 'uppercase', marginBottom: '4px' }}>📌 Compte démo</div>
          <div style={{ fontSize: '12.5px' }}>Email : <strong style={{ color: 'var(--color-brand-primary)' }}>chef@champetres.pro</strong><br/>Mot de passe : <strong style={{ color: 'var(--color-brand-primary)' }}>chef</strong></div>
        </div>
        <div style={{ marginTop: '24px', textAlign: 'center', borderTop: '1px solid var(--color-border-tertiary)', paddingTop: '20px' }}>
          <button onClick={() => { setIsLogin(!isLogin); setErrorMsg(''); setSuccessMsg(''); }} style={{ background: 'none', border: 'none', color: '#2C3E8C', fontSize: '14px', cursor: 'pointer', fontWeight: 500 }}>{isLogin ? "Nouveau ici ? Créer un compte" : "Déjà un compte ? Se connecter"}</button>
        </div>
      </div>
    </div>
  );
}

// ----------------------------------------------------------------------
// APP ROOT WRAPPER
// ----------------------------------------------------------------------
function Root() {
  const [isAuthenticated, setIsAuthenticated] = useState(() => localStorage.getItem('tcp_auth') === 'true');
  const [user, setUser] = useState(() => { try { return JSON.parse(localStorage.getItem('tcp_user') || 'null'); } catch(e) { return null; } });

  const handleLogin = (userData) => { setIsAuthenticated(true); setUser(userData); localStorage.setItem('tcp_auth', 'true'); localStorage.setItem('tcp_user', JSON.stringify(userData)); };
  const handleLogout = () => { setIsAuthenticated(false); setUser(null); localStorage.removeItem('tcp_auth'); localStorage.removeItem('tcp_user'); };

  if (!isAuthenticated) return <AuthScreen onLogin={handleLogin} />;
  return <DashboardChampetre user={user} onLogout={handleLogout} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root />);
</script>
</body>
</html>
